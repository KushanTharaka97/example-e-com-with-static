<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collection | Gold Lanka — Sri Lankan Gold Jewelry</title>
  <meta name="description" content="Browse our full collection of handcrafted 22K and 24K gold jewelry. Filter by category, karat, and price.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="icon" href="assets/images/logo.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/images/logo.png">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    /* Modern enhancements */
    :root {
      --color-gold: #D4AF37;
      --color-gold-light: #F4D03F;
      --color-dark: #1A1A1A;
      --shadow-soft: 0 10px 30px rgba(0,0,0,0.08);
      --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    }
    html {
      scroll-behavior: smooth;
    }
    .product-card {
      transition: var(--transition);
      border: 1px solid rgba(212, 175, 55, 0.1);
      overflow: hidden;
      border-radius: 12px;
      background: white;
    }
    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-soft);
      border-color: var(--color-gold);
    }
    .btn {
      position: relative;
      overflow: hidden;
      z-index: 1;
      transition: var(--transition);
      border-radius: 4px;
      letter-spacing: 0.5px;
    }
    .btn::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 0%; height: 100%;
      background: rgba(255,255,255,0.2);
      transition: width 0.3s ease;
      z-index: -1;
    }
    .btn:hover::before {
      width: 100%;
    }
    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }
    ::-webkit-scrollbar-track {
      background: #f9f9f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #dcdcdc;
      border-radius: 5px;
      border: 2px solid #f9f9f9;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--color-gold);
    }
  </style>
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to content</a>

  <!-- ── Header ── -->
  <header class="site-header" id="site-header">
    <div class="container nav-container">

      <div class="logo">
        <a href="index.html" aria-label="Gold Lanka — Home">GOLD LANKA</a>
      </div>

      <button class="menu-toggle" id="menu-toggle"
              aria-controls="primary-nav"
              aria-expanded="false"
              aria-label="Toggle navigation menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="primary-nav" id="primary-nav" aria-label="Main navigation">
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="catalog.html" class="active">Collection</a></li>
          <li><a href="about.html">About</a></li>
        </ul>
      </nav>

      <div class="nav-actions">
        <a href="wishlist.html" class="wishlist-icon" aria-label="Wishlist">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
          <span id="wishlist-count">0</span>
        </a>
      </div>

    </div>
  </header>

  <!-- ── Main Content ── -->
  <main id="main-content" class="container">

    <div class="catalog-header">
      <h1>Our Collection</h1>
      <div class="catalog-controls">
        <button class="filter-toggle-btn" id="filter-toggle"
                aria-controls="filters-sidebar"
                aria-expanded="false">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" aria-hidden="true">
            <line x1="4" y1="6"  x2="20" y2="6"/>
            <line x1="4" y1="12" x2="16" y2="12"/>
            <line x1="4" y1="18" x2="12" y2="18"/>
          </svg>
          Filters
        </button>
        <input type="search" id="search-input"
               placeholder="Search jewelry…"
               aria-label="Search jewelry">
        <select id="sort-select" aria-label="Sort products">
          <option value="default">Sort By</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="name-asc">Name: A–Z</option>
        </select>
      </div>
    </div>

    <div class="catalog-layout">

      <aside class="filters-sidebar" id="filters-sidebar" aria-label="Product filters">
        <div class="filter-group">
          <h4>Category</h4>
          <div id="category-filters">
            <!-- Populated by JS -->
          </div>
        </div>
        <div class="filter-group">
          <h4>Karat</h4>
          <div id="karat-filters">
            <!-- Populated by JS -->
          </div>
        </div>
      </aside>

      <div class="catalog-content">
        <div id="product-grid" class="product-grid"
             aria-live="polite" aria-label="Product listing">
          <p>Loading products…</p>
        </div>
        <nav id="pagination" class="pagination" aria-label="Pagination"></nav>
      </div>

    </div>
  </main>

  <!-- ── Footer ── -->
  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2024 Gold Lanka. All rights reserved.</p>
        <p><a href="index.html">← Back to Home</a></p>
      </div>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/catalog-data.js"></script>
  <script src="assets/js/catalog.js"></script>
  <script>
    // Mobile filter sidebar toggle
    document.addEventListener('DOMContentLoaded', () => {
      const btn     = document.getElementById('filter-toggle');
      const sidebar = document.getElementById('filters-sidebar');
      if (btn && sidebar) {
        btn.addEventListener('click', () => {
          const open = sidebar.classList.toggle('is-open');
          btn.setAttribute('aria-expanded', String(open));
        });
      }
    });
  </script>
</body>
</html>
